<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot — Arcana AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Syne:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0b0b10;
    --surface2: #0f0f16;
    --text: #f0efe8;
    --text-secondary: #7a7870;
    --text-dim: #33322e;
    --accent: #00e5a0;
    --accent-blue: #0088ff;
    --accent-purple: #7c5cfc;
    --accent-glow: rgba(0,229,160,0.12);
    --accent-glow2: rgba(124,92,252,0.12);
    --border: rgba(255,255,255,0.06);
    --border-accent: rgba(0,229,160,0.2);
    --display: 'Playfair Display', Georgia, serif;
    --heading: 'Syne', sans-serif;
    --mono: 'Space Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--heading);
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  /* ── NEURAL CANVAS ── */
  #neural{position:fixed;inset:0;z-index:0;pointer-events:none}

  /* ── GRAIN ── */
  body::after{
    content:'';position:fixed;inset:0;z-index:999;pointer-events:none;opacity:0.025;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ── NAV ── */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    padding:24px 56px;display:flex;justify-content:space-between;align-items:center;
    backdrop-filter:blur(30px) saturate(1.2);
    background:rgba(5,5,8,0.5);
    border-bottom:1px solid var(--border);
  }
  .logo{
    font-family:var(--heading);font-size:18px;font-weight:700;
    color:var(--text);text-decoration:none;letter-spacing:-0.3px;
  }
  .logo span{color:var(--accent);font-weight:400}
  .nav-right{
    font-family:var(--mono);font-size:10px;color:var(--text-dim);
    letter-spacing:2px;text-transform:uppercase;
  }

  /* ── MAIN WRAP ── */
  .wrap{
    max-width:880px;margin:0 auto;
    padding:140px 56px 100px;
    position:relative;z-index:1;
  }

  /* ── EYEBROW ── */
  .eyebrow{
    font-family:var(--mono);font-size:11px;color:var(--accent);
    letter-spacing:4px;text-transform:uppercase;margin-bottom:32px;
    opacity:0;animation:slideUp .8s ease forwards .2s;
  }
  .eyebrow::before{content:'—— ';opacity:.4}

  /* ── HERO TITLE ── */
  .hero-title{
    font-family:var(--display);
    font-size:clamp(56px,9vw,104px);
    font-weight:400;line-height:1.0;
    letter-spacing:-3px;margin-bottom:28px;
    opacity:0;animation:slideUp .8s ease forwards .4s;
  }
  .hero-title i{
    font-style:italic;
    background:linear-gradient(135deg,var(--accent),var(--accent-blue));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }

  .hero-sub{
    font-size:16px;font-weight:400;color:var(--text-secondary);
    max-width:440px;line-height:1.8;margin-bottom:56px;
    opacity:0;animation:slideUp .8s ease forwards .6s;
  }

  /* ── SECTION TAG ── */
  .section-tag{
    font-family:var(--mono);font-size:10px;color:var(--accent);
    letter-spacing:4px;text-transform:uppercase;
    margin-bottom:32px;display:flex;align-items:center;gap:20px;
  }
  .section-tag::before{content:'';width:32px;height:1px;background:var(--accent);opacity:.5}

  /* ── API STATUS BAR ── */
  .api-bar{
    display:flex;align-items:center;gap:12px;
    background:var(--surface);
    border:1px solid var(--border);
    padding:14px 20px;margin-bottom:48px;
    opacity:0;animation:slideUp .8s ease forwards .8s;
  }
  .pdot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;transition:all .3s}
  .pdot.ok{background:var(--accent);box-shadow:0 0 10px rgba(0,229,160,.5)}
  .pdot.err{background:#ff4466;box-shadow:0 0 10px rgba(255,68,102,.5)}
  .pdot.chk{background:var(--text-dim);animation:blink .7s infinite}
  .pmsg{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--text-secondary);text-transform:uppercase}
  .pmsg.ok{color:var(--accent)}
  .pmsg.err{color:#ff4466}
  .api-powered{
    margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:2px;
    text-transform:uppercase;color:var(--text-dim);
  }

  /* ── DIVIDER ── */
  .divider{
    display:flex;align-items:center;gap:20px;margin:40px 0 32px;
    font-family:var(--mono);font-size:9px;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;
  }
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

  /* ── QUESTION ── */
  .qlabel{font-family:var(--mono);font-size:9px;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;display:block;margin-bottom:12px}
  textarea{
    width:100%;padding:18px 20px;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);font-family:var(--display);font-size:1.1rem;font-style:italic;
    line-height:1.7;resize:none;height:96px;outline:none;transition:border-color .3s;
    -webkit-font-smoothing:antialiased;
  }
  textarea:focus{border-color:var(--border-accent)}
  textarea::placeholder{color:var(--text-dim);font-style:italic}

  /* ── SPREAD ── */
  .spread-sel{display:flex;gap:8px;margin:20px 0 32px;flex-wrap:wrap}
  .sbtn{
    padding:10px 20px;background:transparent;
    border:1px solid var(--border);color:var(--text-dim);
    font-family:var(--mono);font-size:9px;letter-spacing:2px;
    text-transform:uppercase;cursor:pointer;transition:all .25s;
  }
  .sbtn:hover{border-color:rgba(0,229,160,.3);color:var(--text-secondary)}
  .sbtn.on{background:var(--accent-glow);border-color:var(--border-accent);color:var(--accent)}

  /* ── MAIN BTN ── */
  .btn-read{
    width:100%;padding:18px;
    background:var(--accent);
    border:none;
    color:var(--bg);font-family:var(--mono);font-size:11px;font-weight:700;
    letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;
  }
  .btn-read:hover{box-shadow:0 0 60px rgba(0,229,160,.2);transform:translateY(-2px)}
  .btn-read:active{transform:scale(.99)}
  .btn-read:disabled{
    background:transparent;border:1px solid var(--border);
    color:var(--text-dim);cursor:not-allowed;transform:none;box-shadow:none;
  }

  /* ── SPREAD LABELS ── */
  .slabel{
    text-align:center;margin:48px 0 8px;
    font-family:var(--mono);font-size:9px;letter-spacing:5px;
    color:var(--text-dim);text-transform:uppercase;display:none;
  }
  .sublabels{display:none;justify-content:center;margin-bottom:20px;gap:8px;flex-wrap:wrap}
  .poslabel{
    font-family:var(--mono);font-size:8px;letter-spacing:2px;color:rgba(0,229,160,.4);
    text-transform:uppercase;text-align:center;min-width:100px;
  }

  /* ── CARDS ── */
  .cards-area{display:flex;justify-content:center;gap:clamp(10px,2vw,20px);flex-wrap:wrap;margin-bottom:24px}
  .card-slot{display:flex;flex-direction:column;align-items:center}
  .card-wrap{width:clamp(96px,14vw,120px);height:clamp(160px,24vw,200px);perspective:900px;margin-bottom:10px}
  .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .9s cubic-bezier(.4,0,.2,1)}
  .card-inner.flipped{transform:rotateY(180deg)}
  .card-inner.rev-flip{transform:rotateY(180deg) rotate(180deg)}
  @keyframes sN{0%{transform:rotateY(0) scale(1)}20%{transform:rotateY(210deg) scale(1.1)}65%{transform:rotateY(490deg) scale(1.06)}88%{transform:rotateY(538deg) scale(1.01)}100%{transform:rotateY(540deg) scale(1)}}
  @keyframes sR{0%{transform:rotateY(0) rotate(0) scale(1)}20%{transform:rotateY(210deg) rotate(55deg) scale(1.1)}65%{transform:rotateY(490deg) rotate(145deg) scale(1.06)}88%{transform:rotateY(538deg) rotate(178deg) scale(1.01)}100%{transform:rotateY(540deg) rotate(180deg) scale(1)}}
  .card-inner.sN{animation:sN 1.7s cubic-bezier(.4,0,.2,1) forwards}
  .card-inner.sR{animation:sR 1.7s cubic-bezier(.4,0,.2,1) forwards}

  .card-face{
    position:absolute;width:100%;height:100%;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    overflow:hidden;
    border:1px solid var(--border);
  }

  /* Card back */
  .card-back{background:var(--surface2);display:flex;align-items:center;justify-content:center}
  .cba{
    width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;
    background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(0,229,160,.02) 10px,rgba(0,229,160,.02) 11px),
               repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(0,229,160,.02) 10px,rgba(0,229,160,.02) 11px);
  }
  .cba::before{
    content:'';position:absolute;inset:8px;
    border:1px solid rgba(0,229,160,.1);
  }
  .cba::after{
    content:'✦';font-size:1.8rem;color:rgba(0,229,160,.15);
    position:relative;z-index:1;font-family:var(--display);
  }

  /* Card front */
  .card-front{
    background:#0d0d16;
    transform:rotateY(180deg);
    display:flex;flex-direction:column;align-items:stretch;justify-content:stretch;
    padding:0;
    position:relative;overflow:hidden;
  }
  .card-front svg{width:100%;height:100%;display:block}

  /* ── PILLS ── */
  .pills{display:none;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:40px}
  .pill{
    font-family:var(--mono);font-size:9px;letter-spacing:1px;
    padding:6px 14px;background:rgba(0,229,160,.07);
    border:1px solid rgba(0,229,160,.15);color:rgba(0,229,160,.8);
    text-transform:uppercase;
  }
  .pill.rev{background:rgba(255,68,136,.07);border-color:rgba(255,68,136,.2);color:rgba(255,100,150,.8)}

  /* ── RESULT ── */
  .result{display:none;margin-top:0}
  .result.show{display:block;animation:slideUp .6s ease forwards}

  /* Analisa section wrapper */
  .analisa-section{display:none;margin-top:48px}
  .analisa-section.show{display:block}

  /* Sentiment bar */
  .r-sentiment-wrap{
    background:var(--surface);border:1px solid var(--border);
    padding:20px 24px;margin-bottom:4px;position:relative;overflow:hidden;
  }
  .r-sentiment-wrap::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5;
  }
  .r-sentiment-title{
    font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--text);
    text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px;
  }
  .r-sentiment-title .sdot{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
  }
  .sdot.pos{background:var(--accent);box-shadow:0 0 8px rgba(0,229,160,.6)}
  .sdot.neu{background:#f5c842;box-shadow:0 0 8px rgba(245,200,66,.5)}
  .sdot.neg{background:#ff4466;box-shadow:0 0 8px rgba(255,68,102,.5)}
  .r-bar-track{height:4px;background:rgba(255,255,255,.06);margin-bottom:4px}
  .r-bar-fill{height:100%;transition:width 1s ease;background:linear-gradient(90deg,var(--accent),var(--accent-blue))}
  .r-bar-score{font-family:var(--mono);font-size:10px;color:var(--text-secondary);text-align:right}

  /* Card items */
  .r-cards-list{display:flex;flex-direction:column;gap:3px;margin-bottom:4px}
  .r-card-item{
    background:var(--surface);border:1px solid var(--border);
    padding:20px 24px;position:relative;transition:border-color .2s;
  }
  .r-card-item:hover{border-color:rgba(0,229,160,.15)}
  .r-card-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
  .r-card-item.pos::before{background:var(--accent)}
  .r-card-item.neu::before{background:#f5c842}
  .r-card-item.neg::before{background:#ff4466}
  .r-card-item.rev-c::before{background:var(--accent-purple)}
  .r-card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
  .r-card-sym{font-size:1.5rem;line-height:1;flex-shrink:0;margin-top:2px}
  .r-card-name{
    font-family:var(--display);font-size:17px;font-weight:400;font-style:italic;
    color:var(--text);flex:1;
  }
  .r-card-badges{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
  .badge{
    font-family:var(--mono);font-size:8px;letter-spacing:1px;
    padding:3px 9px;text-transform:uppercase;
  }
  .badge-pos{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--accent)}
  .badge-neu{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);color:#f5c842}
  .badge-neg{background:rgba(255,68,102,.08);border:1px solid rgba(255,68,102,.2);color:#ff6688}
  .badge-rev{background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.25);color:#a98fff}
  .badge-pos2{background:rgba(0,136,255,.08);border:1px solid rgba(0,136,255,.2);color:#4db8ff}
  .r-card-pos-label{
    font-family:var(--mono);font-size:8px;letter-spacing:2px;
    color:var(--text-dim);text-transform:uppercase;margin-bottom:6px;
  }
  .r-card-desc{
    font-size:14px;color:var(--text-secondary);line-height:1.75;
  }

  /* Kesimpulan */
  .r-kesimpulan{
    background:var(--surface);border:1px solid var(--border);
    padding:24px;margin-top:4px;position:relative;
  }
  .r-kesimpulan::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent-purple),transparent);opacity:.5;
  }
  .r-kes-label{
    font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--accent-purple);
    text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;
  }
  .r-kes-label::before{content:'📋';font-size:12px}
  .r-kes-text{
    font-family:var(--display);font-size:15px;line-height:1.8;
    color:rgba(240,239,232,.88);font-weight:400;
  }
  .r-kes-text strong{color:var(--accent);font-weight:400;font-style:normal}

  /* Disclaimer */
  .r-disclaimer{
    margin-top:12px;padding:14px 20px;
    background:rgba(245,200,66,.04);border:1px solid rgba(245,200,66,.12);
    font-family:var(--mono);font-size:10px;color:var(--text-dim);
    letter-spacing:.5px;line-height:1.6;
  }

  /* Loading state */
  .r-loading{
    background:var(--surface);border:1px solid var(--border);
    padding:36px;text-align:center;
  }
  .r-loading-inner{display:flex;align-items:center;justify-content:center;gap:12px}
  .rpulse{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(0,229,160,.5)}
  .rpulse.on{animation:blink .9s infinite}
  .rmuted{color:var(--text-dim);font-style:italic;font-family:var(--mono);font-size:.85rem;letter-spacing:1px}
  .rerr{color:#ff6688;font-style:italic;font-size:.9rem;font-family:var(--mono)}

  /* ── FOOTER ── */
  footer{
    margin-top:80px;padding-top:32px;
    border-top:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
  }
  footer span{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase}

  /* ── ANIMATIONS ── */
  @keyframes slideUp{
    from{opacity:0;transform:translateY(24px)}
    to{opacity:1;transform:translateY(0)}
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

  @media(max-width:600px){
    nav{padding:20px 24px}
    .wrap{padding:110px 24px 80px}
    .hero-title{font-size:3.2rem;letter-spacing:-2px}
    .result{padding:24px}
  }
</style>
</head>
<body>

<canvas id="neural"></canvas>

<!-- NAV -->
<nav>
  <a href="#" class="logo">Tarot<span>.</span></a>
  <div class="nav-right">Arcana AI — by michxbt</div>
</nav>

<div class="wrap">

  <!-- HERO -->
  <div class="eyebrow">Arcana Divination</div>
  <h1 class="hero-title">Read the <i>cards.</i><br>Trust the <i>arcana.</i></h1>
  <p class="hero-sub">Tanyakan apa yang ada di hatimu — AI akan membaca energi kartu dan menafsirkan jalanmu.</p>

  <!-- API STATUS BAR -->
  <div class="api-bar">
    <div class="pdot ok" id="pdot"></div>
    <span class="pmsg ok" id="pmsg">Connected — Powered by Anthropic</span>
    <span class="api-powered">Claude AI</span>
  </div>

  <!-- INPUT -->
  <div class="divider">pertanyaan</div>
  <label class="qlabel">Apa yang ingin kamu ketahui?</label>
  <textarea id="qInput" placeholder="Tuliskan pertanyaanmu... (contoh: Bagaimana perjalanan karirku 2 bulan ke depan?)"></textarea>

  <!-- SPREAD -->
  <div class="spread-sel">
    <button class="sbtn on" onclick="setSpread(this,3)">Past · Present · Future</button>
    <button class="sbtn"    onclick="setSpread(this,1)">Single Card</button>
    <button class="sbtn"    onclick="setSpread(this,5)">Celtic Cross</button>
  </div>

  <button class="btn-read" id="readBtn" onclick="startReading()">Buka Kartu</button>

  <div class="slabel"    id="slabel"></div>
  <div class="sublabels" id="sublabels"></div>
  <div class="cards-area" id="cardsArea"></div>
  <div class="pills"     id="pills"></div>

  <div class="analisa-section" id="analisaSection">
    <div class="divider">analisa ai</div>
    <div class="result" id="result"></div>
  </div>

  <footer>
    <span>© 2026 Mich</span>
    <span>In arcana veritas</span>
  </footer>
</div>

<script>
// Vercel serverless endpoint — no proxy needed
const API_URL = '/api/chat';

/* ── TAROT DATA ── */
const T = [
  {n:"The Fool",r:"0",s:"🌀",k:"kebebasan, awal baru, spontanitas"},
  {n:"The Magician",r:"I",s:"⚡",k:"kekuatan, kreativitas, manifestasi"},
  {n:"The High Priestess",r:"II",s:"🌙",k:"intuisi, misteri, kebijaksanaan batin"},
  {n:"The Empress",r:"III",s:"🌿",k:"kesuburan, kelimpahan, alam"},
  {n:"The Emperor",r:"IV",s:"👑",k:"otoritas, struktur, kepemimpinan"},

  {n:"The Chariot",r:"VII",s:"🏹",k:"tekad, kemenangan, kontrol"},
  {n:"Strength",r:"VIII",s:"🦁",k:"keberanian, kesabaran, kekuatan batin"},
  {n:"The Hermit",r:"IX",s:"🕯️",k:"introspeksi, pencarian jiwa, kesendirian"},
  {n:"Wheel of Fortune",r:"X",s:"🎡",k:"takdir, siklus, perubahan"},
  {n:"Justice",r:"XI",s:"⚖️",k:"keadilan, kebenaran, keseimbangan"},
  {n:"The Hanged Man",r:"XII",s:"🙃",k:"penangguhan, perspektif baru, pengorbanan"},
  {n:"Death",r:"XIII",s:"🌑",k:"transformasi, akhir siklus, perubahan besar"},
  {n:"Temperance",r:"XIV",s:"🌊",k:"keseimbangan, moderasi, penyembuhan"},
  {n:"The Devil",r:"XV",s:"🔗",k:"batasan, keterikatan, godaan"},
  {n:"The Tower",r:"XVI",s:"🗼",k:"kehancuran tiba-tiba, wahyu, kekacauan"},
  {n:"The Star",r:"XVII",s:"⭐",k:"harapan, inspirasi, kedamaian"},
  {n:"The Moon",r:"XVIII",s:"🌕",k:"ilusi, ketakutan, alam bawah sadar"},
  {n:"The Sun",r:"XIX",s:"☀️",k:"sukacita, vitalitas, kesuksesan"},
  {n:"Judgement",r:"XX",s:"🎺",k:"kebangkitan, transformasi, penilaian diri"},

/* ── RNG ── */
function lcg(seed){
  let s=(seed^0xDEADBEEF)>>>0;
  return ()=>{s=(Math.imul(1664525,s)+1013904223)>>>0;return s/0x100000000};
}
function draw(q,n){
  const seed=Array.from(q).reduce((a,c,i)=>(a+c.charCodeAt(0)*(i+1)*37)|0,0)^(Date.now()&0xFFFFF);
  const rng=lcg(seed>>>0), deck=[...T];
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  return Array.from({length:n},(_,i)=>({...deck[i],rev:rng()>.62}));
}

async function animCard(i,c){
  const ci=document.getElementById('ci'+i), cf=document.getElementById('cf'+i);
  cf.style.padding = '0';
  cf.style.overflow = 'hidden';
  cf.innerHTML = getCardArt(c) + (c.rev ? `<div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:7px;color:#ff6688;letter-spacing:1.5px;border:1px solid rgba(255,68,136,.3);padding:2px 6px;background:rgba(0,0,0,.5);text-transform:uppercase">Reversed</div>` : '');
  ci.className='card-inner '+(c.rev?'sR':'sN');
  await wait(1750);
  ci.className='card-inner '+(c.rev?'rev-flip':'flipped');
}

async function startReading(){
  if(busy) return;
  const q=document.getElementById('qInput').value.trim();
  if(!q){document.getElementById('qInput').focus();return;}
  busy=true;
  const btn=document.getElementById('readBtn');
  btn.disabled=true; btn.textContent='Reading cards...';
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').style.display='none';
  document.getElementById('analisaSection').classList.remove('show');
  document.getElementById('pills').style.display='none';

  const sp=SP[curSpread];
  buildCards(curSpread);
  const sl=document.getElementById('slabel');
  sl.textContent=sp.label; sl.style.display='block';
  const sub=document.getElementById('sublabels');
  sub.innerHTML=sp.pos.map(p=>`<div class="poslabel">${p}</div>`).join('');
  sub.style.display='flex';

  const cards=draw(q,curSpread);
  for(let i=0;i<curSpread;i++){await wait(i?500:300);await animCard(i,cards[i]);}

}

async function aiRead(q,cards,pos){
  const box=document.getElementById('result');
  const section=document.getElementById('analisaSection');

  // Show section & result
  section.classList.add('show');
  box.classList.add('show');

  // Show loading
  box.innerHTML=`
    <div class="r-loading">
      <div class="r-loading-inner">
        <div class="rpulse on" id="rpulse"></div>
        <span class="rmuted">// membaca energi kartu...</span>
      </div>
    </div>`;

  // Scroll to analisa section
  setTimeout(()=> section.scrollIntoView({behavior:'smooth', block:'start'}), 200);

  const desc=cards.map((c,i)=>`${pos[i]}: ${c.n} (${c.rev?'Terbalik':'Tegak'}, simbol: ${c.s}) — kata kunci: ${c.k}`).join('\n');
  const sname={1:'Single Card',3:'Past-Present-Future',5:'Celtic Cross'}[cards.length]||'Tarot';

  const prompt=`Kamu adalah pembaca tarot yang bijaksana. Balas HANYA dengan JSON murni tanpa teks lain, tanpa markdown, tanpa backtick.

Pertanyaan pengguna: "${q}"
Spread: ${sname}
Kartu yang keluar:
${desc}

Format JSON yang harus kamu balas (persis seperti ini, ganti nilai dalam kurung siku):
{"sentimen":"[Positif atau Netral atau Perlu Perhatian]","skor":[angka 1-10],"kartu_analisis":[{"posisi":"[nama posisi]","nama":"[nama kartu]","simbol":"[emoji]","orientasi":"[Tegak atau Terbalik]","tema":"[2-3 kata tema utama]","energi":"[Positif atau Netral atau Tantangan]","waktu":"[Sekarang atau Segera atau Jangka Panjang]","penjelasan":"[2 kalimat bahasa Indonesia hangat dan mendalam]"}],"kesimpulan":"[2-3 kalimat naratif yang menjawab pertanyaan langsung, bahasa Indonesia puitis, akhiri dengan kalimat penyemangat]"}

Pastikan ada ${cards.length} objek dalam kartu_analisis. Balas JSON saja, tidak ada teks lain sama sekali.`;

  try{
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-5',
        max_tokens:2000,
        system:'You are a tarot reader. Respond ONLY with a valid JSON object. No markdown, no backticks, no prose. Start your response with { and end with }.',
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      throw new Error(e?.error?.message||'HTTP '+res.status);
    }
    const data=await res.json();
    const raw=data.content?.find(b=>b.type==='text')?.text;
    if(!raw) throw new Error('Respons kosong dari API');

    // Robust JSON extraction — find first { ... } block
    let parsed;
    try{
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if(!jsonMatch) throw new Error('No JSON found');
      parsed = JSON.parse(jsonMatch[0]);
    }catch(parseErr){
      // Show raw response for debugging
      box.innerHTML=`<div class="r-loading" style="padding:24px">
        <div style="font-family:var(--mono);font-size:10px;color:#ff6688;margin-bottom:12px">// JSON parse error — raw response:</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-secondary);white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto">${raw.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>`;
      return;
    }

    renderResult(parsed, cards);

  }catch(e){
    const dot=document.getElementById('pdot'), msg=document.getElementById('pmsg');
    if(dot){dot.className='pdot err'; msg.className='pmsg err'; msg.textContent='API Error: '+e.message;}
    box.innerHTML=`<div class="r-loading" style="padding:24px">
      <div style="font-family:var(--mono);font-size:11px;color:#ff6688;margin-bottom:8px">// Error</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text-secondary)">${e.message}</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-top:8px">Cek: ANTHROPIC_API_KEY sudah diset di Vercel?</div>
    </div>`;
  }
}

function renderResult(data, cards){
  const box=document.getElementById('result');
  const skor=Math.min(10,Math.max(1,data.skor||5));
  const barW=Math.round(skor*10);

  const sentClass = data.sentimen==='Positif'?'pos': data.sentimen==='Netral'?'neu':'neg';
  const sentLabel = data.sentimen||'Netral';

  // Sentiment bar
  let html=`
    <div class="r-sentiment-wrap">
      <div class="r-sentiment-title">
        <span class="sdot ${sentClass}"></span>
        ${sentLabel}
      </div>
      <div class="r-bar-track"><div class="r-bar-fill" id="rBarFill" style="width:0%"></div></div>
      <div class="r-bar-score">${skor} / 10</div>
    </div>`;

  // Card analysis items
  html+=`<div class="r-cards-list">`;
  (data.kartu_analisis||[]).forEach((k,i)=>{
    const card = cards[i]||{};
    const energiClass = k.energi==='Positif'?'pos': k.energi==='Tantangan'?'neg':'neu';
    const energiBadge = k.energi==='Positif'?'badge-pos': k.energi==='Tantangan'?'badge-neg':'badge-neu';
    const waktuBadge = 'badge-pos2';
    const revBadge = k.orientasi==='Terbalik'?`<span class="badge badge-rev">Terbalik</span>`:'';

    html+=`
      <div class="r-card-item ${energiClass}">
        <div class="r-card-pos-label">${k.posisi||''}</div>
        <div class="r-card-head">
          <div class="r-card-sym">${k.simbol||card.s||'✦'}</div>
          <div class="r-card-name">${k.nama||card.n||''}</div>
          <div class="r-card-badges">
            <span class="badge ${energiBadge}">${k.energi||''}</span>
            <span class="badge ${waktuBadge}">${k.waktu||''}</span>
            ${revBadge}
          </div>
        </div>
        <div class="r-card-desc">${k.penjelasan||''}</div>
      </div>`;
  });
  html+=`</div>`;

  // Kesimpulan
  const kesText = (data.kesimpulan||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  html+=`
    <div class="r-kesimpulan">
      <div class="r-kes-label">Kesimpulan</div>
      <div class="r-kes-text">${kesText}</div>
    </div>
    <div class="r-disclaimer">⚠️ <strong>Disclaimer:</strong> Penafsiran dihasilkan AI berdasarkan simbolisme tarot. Bukan ramalan atau saran profesional. Selalu gunakan kebijaksanaan sendiri.</div>`;

  box.innerHTML=html;

  // Animate bar fill
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const fill=document.getElementById('rBarFill');
      if(fill) fill.style.width=barW+'%';
      // Smooth scroll to result
      document.getElementById('analisaSection').scrollIntoView({behavior:'smooth', block:'start'});
    });
  });
}

const c = document.getElementById('neural');
const gl = c.getContext('webgl') || c.getContext('experimental-webgl');

if (gl) {
  let W, H;
  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
    gl.viewport(0, 0, W, H);
  }
  resize();
  window.addEventListener('resize', resize);

  const vsSource = `
    attribute vec2 a_pos;
    void main() { gl_Position = vec4(a_pos, 0.0, 1.0); gl_PointSize = 2.0; }
  `;

  const fsSource = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;
    uniform vec2 u_mouse;

    vec2 hash(vec2 p) {
      p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
      return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(mix(dot(hash(i), f),
                     dot(hash(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0)), u.x),
                 mix(dot(hash(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0)),
                     dot(hash(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0)), u.x), u.y);
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      vec2 p = uv * 2.0 - 1.0;
      p.x *= u_res.x / u_res.y;

      float t = u_time * 0.12;
      float n1 = noise(p * 1.6 + t * 0.4);
      float n2 = noise(p * 2.8 - t * 0.25 + vec2(5.0));
      float n3 = noise(p * 4.5 + t * 0.18 + vec2(10.0));

      float lines = 0.0;
      for (float i = 0.0; i < 6.0; i++) {
        float angle = n1 * 6.28 + i * 1.047;
        vec2 dir = vec2(cos(angle), sin(angle));
        float wave = sin(dot(p, dir) * (4.0 + i) + t * (0.5 + i * 0.1) + n2 * 3.0);
        lines += (1.0 - smoothstep(0.0, 0.008, abs(wave))) * 0.1;
      }

      float nodes = 0.0;
      for (float i = 0.0; i < 16.0; i++) {
        vec2 np = hash(vec2(i * 13.7, i * 7.3)) * 1.5;
        np += vec2(sin(t + i), cos(t * 0.7 + i * 2.0)) * 0.25;
        float d = length(p - np);
        nodes += smoothstep(0.022, 0.0, d) * 0.5;
        nodes += smoothstep(0.12, 0.0, d) * 0.025;
      }

      vec2 mp = u_mouse / u_res * 2.0 - 1.0;
      mp.x *= u_res.x / u_res.y;
      float md = length(p - mp);
      float mouseGlow = smoothstep(0.5, 0.0, md) * 0.07;

      /* Tarot accent: blend teal + purple instead of teal + blue */
      vec3 colTeal   = vec3(0.0, 0.9, 0.63);
      vec3 colPurple = vec3(0.48, 0.36, 0.99);
      vec3 colMix = mix(colTeal, colPurple, uv.x * 0.55 + n1 * 0.45);

      float intensity = lines + nodes + mouseGlow;
      vec3 col = colMix * intensity;

      float vig = 1.0 - length(uv - 0.5) * 0.95;
      col *= vig;
      col += vec3(0.008, 0.008, 0.012);

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  function createShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { gl.deleteShader(s); return null; }
    return s;
  }

  const vs = createShader(gl.VERTEX_SHADER, vsSource);
  const fs = createShader(gl.FRAGMENT_SHADER, fsSource);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.linkProgram(prog); gl.useProgram(prog);

  const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
  const posLoc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes  = gl.getUniformLocation(prog, 'u_res');
  const uMouse= gl.getUniformLocation(prog, 'u_mouse');

  let mx = W * .5, my = H * .5;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = H - e.clientY; });

  (function render(t) {
    gl.uniform1f(uTime, t * .001);
    gl.uniform2f(uRes, W, H);
    gl.uniform2f(uMouse, mx, my);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  })(0);

} else {
  // Canvas 2D fallback
  const ctx = c.getContext('2d');
  let W2, H2;
  function resize2() { W2 = c.width = innerWidth; H2 = c.height = innerHeight; }
  resize2(); addEventListener('resize', resize2);
  const nodes = [];
  for (let i = 0; i < 55; i++) {
    nodes.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.5+.5});
  }
  (function draw2() {
    ctx.clearRect(0,0,W2,H2);
    nodes.forEach(n=>{
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<0||n.x>W2)n.vx*=-1;
      if(n.y<0||n.y>H2)n.vy*=-1;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,229,160,0.35)';ctx.fill();
    });
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<140){
          ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);
          ctx.strokeStyle=`rgba(124,92,252,${0.05*(1-d/140)})`;ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw2);
  })();
}
</script>
</body>
